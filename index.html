
<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA PRÁTICO 3.0 - SALVANDO VIDAS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
    <style>
        :root { --bg: #0b0f19; --card: #161d2f; --primary: #6366f1; --success: #10b981; --error: #ef4444; --accent: #f59e0b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #e2e8f0; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--card); padding: 15px; border-radius: 12px; border: 2px solid #334155; position: sticky; top: 10px; z-index: 1000; }
        .btn-home { background: var(--accent); color: #000; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; }
        
        #video-container { display: none; margin-bottom: 30px; background: #000; border-radius: 15px; overflow: hidden; border: 4px solid var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        video { width: 100%; display: block; max-height: 500px; }
        .video-footer { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; }

        .mod-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(310px, 1fr)); gap: 20px; }
        .mod-card { background: var(--card); padding: 18px; border-radius: 12px; border: 1px solid #334155; }
        .mod-title { color: var(--accent); font-weight: bold; margin-bottom: 12px; border-bottom: 2px solid var(--primary); padding-bottom: 5px; font-size: 1.1rem; }
        
        .sub-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; margin: 6px 0; background: #1e293b; border-radius: 8px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .sub-item:hover { background: #334155; border-color: var(--primary); transform: translateX(5px); }
        .sub-item.locked { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }
        .sub-name { color: #ffffff; font-size: 0.95rem; font-weight: 500; }
        .check { color: var(--success); font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>
<script>
    // --- BLOCO DE SEGURANÇA SALVANDO VIDAS ---
    (function() {
        const senhaMestra = "Aprovação2026"; 
        let autorizado = sessionStorage.getItem("acesso_vipvendas");

        if (autorizado !== "true") {
            let tentativa = prompt("SISTEMA SALVANDO VIDAS\nPor favor, digite a senha de acesso:");
            
            if (tentativa === senhaMestra) {
                sessionStorage.setItem("acesso_vipvendas", "true");
            } else {
                alert("Senha incorreta! Acesso negado.");
                window.location.href = "https://www.google.com";
            }
        }
    })();
</script>

<div class="container">
    <div class="nav-bar">
        <div>
            <h1 style="margin:0; color:var(--accent); font-size: 1.5rem;">SALVANDO VIDAS NO TRÂNSITO!!!!!</h1>
            <p style="margin:5px 0 0 0; opacity:0.9; color: white;">Módulo de Evolução Teórico-Prática</p>
        </div>
        <a href="teste.html" class="btn-home">📋 ÁREA DO INSTRUTOR</a>
    </div>

    <div id="video-container">
        <video id="vid-player" controls controlsList="nodownload"></video>
        <div class="video-footer">
            <span id="video-titulo" style="font-weight:bold; color: white;"></span>
            <button onclick="concluirModulo()" style="background:var(--success); color:white; border:none; padding:12px 20px; border-radius:8px; cursor:pointer; font-weight:bold;">MARCAR COMO CONCLUÍDO ✅</button>
        </div>
    </div>

    <div class="mod-grid" id="grid-modulos"></div>
</div>

<script>
    const estrutura = [
        { id: 1, t: "Módulo I: Preparação", s: [
            {n: "Entrada no Veículo", p: 3, o: "Verificar tráfego antes de abrir a porta."},
            {n: "Ajuste de Banco/Pedais", p: 1, o: "Pernas levemente flexionadas ao acionar embreagem."},
            {n: "Ajuste de Retrovisores", p: 1, o: "Reduzir pontos cegos laterais e traseiro."},
            {n: "Postura ao Volante", p: 1, o: "Braços levemente flexionados (posição 10h10)."},
            {n: "Uso do Cinto", p: 20, o: "Item obrigatório (Falta Eliminatória)."}
        ]},
        { id: 2, t: "Módulo II: Comandos", s: [
            {n: "Domínio da Embreagem", p: 2, o: "Controle suave para evitar solavancos."},
            {n: "Troca de Marchas", p: 2, o: "Sincronia entre rotação e velocidade."},
            {n: "Partida do Motor", p: 2, o: "Câmbio em ponto neutro e pé no freio."},
            {n: "Leitura de Painel", p: 1, o: "Atenção às luzes de advertência."},
            {n: "Uso do Freio", p: 2, o: "Frenagem gradual e antecipada."},
            {n: "Freio de Mão", p: 1, o: "Desacionar totalmente antes do movimento."}
        ]},
        { id: 3, t: "Módulo III: Saída", s: [
            {n: "Sinalização (Seta)", p: 3, o: "Acionar com antecedência mínima de 30m."},
            {n: "Observação Ponto Cego", p: 3, o: "Verificar retrovisores e visão lateral."},
            {n: "Controle de Aceleração", p: 2, o: "Aceleração progressiva sem excesso."},
            {n: "Ingresso na Via", p: 20, o: "Dar preferência aos veículos da via."},
            {n: "Desligar Sinalização", p: 1, o: "Encerrar sinalização após a manobra."}
        ]},
        { id: 4, t: "Módulo IV: Movimento", s: [
            {n: "Uso do Conta-giros", p: 1, o: "Troca ideal entre 2.000 e 2.500 RPM."},
            {n: "2ª e 3ª Marchas", p: 2, o: "Manter o veículo no torque adequado."}
        ]},
        { id: 5, t: "Módulo V: Obstáculos", s: [
            {n: "Seta p/ Esquerda", p: 3, o: "Sinalizar manobra de desvio."},
            {n: "Verificar Impedimento", p: 3, o: "Observar distância do obstáculo."},
            {n: "Execução do Desvio", p: 20, o: "Manter distância lateral de segurança."},
            {n: "Retorno à Via", p: 3, o: "Sinalizar retorno à direita."},
            {n: "Desligar Seta", p: 1, o: "Finalizar comunicação após retorno."},
            {n: "Continuar Trajeto", p: 1, o: "Manter alinhamento na faixa."}
        ]},
        { id: 6, t: "Módulo VI: Cruzamentos", s: [
            {n: "Redução de Velocidade", p: 2, o: "Aproximação em velocidade reduzida."},
            {n: "PARE Obrigatório", p: 20, o: "Imobilização total antes da linha."},
            {n: "Preferência", p: 20, o: "Respeitar sinalização e pedestres."}
        ]},
        { id: 7, t: "Módulo VII: Fluxo Urbano", s: [
            {n: "Pisar na Embreagem", p: 2, o: "Acionamento firme para trocas."},
            {n: "Uso da 1ª Marcha", p: 2, o: "Exclusivo para saída ou manobra lenta."},
            {n: "Ganho de Velocidade", p: 2, o: "Aceleração constante e linear."},
            {n: "Manutenção de Faixa", p: 3, o: "Manter-se no centro da faixa de rolagem."},
            {n: "Monitoramento RPM", p: 1, o: "Monitorar eficiência do motor."},
            {n: "Uso de 2ª e 3ª", p: 2, o: "Adequação ao fluxo urbano comum."},
            {n: "Engate da 4ª Marcha", p: 2, o: "Desenvolver em vias de maior fluidez."}
        ]},
        { id: 8, t: "Módulo VIII: Geometria", s: [
            {n: "Frenagem de Curva", p: 2, o: "Reduzir velocidade antes da curva."},
            {n: "Traçado de Curva", p: 3, o: "Tangência correta sem invadir contramão."}
        ]},
        { id: 9, t: "Módulo IX: Encerramento", s: [
            {n: "Estacionar à Direita", p: 3, o: "Alinhamento com a guia (meio-fio)."},
            {n: "Estacionar à Esquerda", p: 3, o: "Sinalizar e alinhar corretamente."},
            {n: "Marcha a Ré", p: 3, o: "Controle de visão e embreagem."},
            {n: "Procedimento Final", p: 1, o: "Freio de mão, ponto neutro e motor desligado."}
        ]}
    ];

    let progresso = localStorage.getItem('progresso_aluno') || "1_1";
    let videoAtual = { m: 1, s: 1 };

    function renderizar() {
        const grid = document.getElementById('grid-modulos');
        grid.innerHTML = "";
        let [pM, pS] = progresso.split('_').map(Number);

        estrutura.forEach(m => {
            let card = `<div class="mod-card"><div class="mod-title">${m.t}</div>`;
            m.s.forEach((sub, index) => {
                let sId = index + 1;
                let isLocked = (m.id > pM) || (m.id === pM && sId > pS);
                let isDone = (m.id < pM) || (m.id === pM && sId < pS);
                
                card += `
                    <div class="sub-item ${isLocked ? 'locked' : ''}" onclick="${isLocked ? '' : `play(${m.id}, ${sId}, '${sub.n}')`}">
                        <span class="sub-name">${sId}. ${sub.n}</span>
                        <span>${isDone ? '<span class="check">✔</span>' : (isLocked ? '🔒' : '▶')}</span>
                    </div>`;
            });
            card += `</div>`;
            grid.innerHTML += card;
        });
    }

    function play(m, s, nome) {
        videoAtual = { m, s };
        const player = document.getElementById('vid-player');
        
        // Padrão de nome que você pediu: videos/fase1_sub1.mp4
        player.src = `videos/fase${m}_sub${s}.mp4`; 
        
        document.getElementById('video-titulo').innerText = `ASSISTINDO: ${nome.toUpperCase()}`;
        document.getElementById('video-container').style.display = 'block';
        player.play();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function concluirModulo() {
        let { m, s } = videoAtual;
        let modAtual = estrutura.find(x => x.id === m);
        let pM = m, pS = s + 1;

        if (pS > modAtual.s.length) { 
            pM++; 
            pS = 1; 
        }

        // Se passar do módulo 9, mantém no último item
        if (pM > 9) { pM = 9; pS = modAtual.s.length; }

        progresso = pM + "_" + pS;
        localStorage.setItem('progresso_aluno', progresso);
        
        document.getElementById('video-container').style.display = 'none';
        document.getElementById('vid-player').pause();
        renderizar();
    }

    window.onload = renderizar;
</script>
</body>
</html>
