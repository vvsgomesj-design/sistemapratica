<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA PRÁTICA - AVALIAÇÃO FINAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
    <style>
        :root { --bg: #0b0f19; --card: #161d2f; --primary: #6366f1; --success: #10b981; --error: #ef4444; --accent: #f59e0b; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #ffffff; margin: 0; padding: 20px; }
        .container { max-width: 980px; margin: 0 auto; }

        .nav-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--card); padding: 15px; border-radius: 12px; 
            border: 2px solid #334155; position: sticky; top: 10px; z-index: 2000;
            margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .btn-retorno {
            background: var(--accent); color: #000; padding: 10px 20px; 
            border-radius: 8px; text-decoration: none; font-weight: bold; 
            border: none; cursor: pointer; transition: 0.3s;
        }

        /* TABELA COM CORREÇÃO DE COR DA LETRA */
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; margin-bottom: 20px; border: 1px solid #334155; }
        th { background: #1e293b; color: var(--accent); padding: 15px; text-align: left; text-transform: uppercase; font-size: 0.8rem; border-bottom: 2px solid #334155; }
        /* Força a cor branca para o texto da tabela na interface do instrutor */
#corpo-tabela td { 
    color: #ffffff !important; 
    font-weight: 500;
}

/* Garante contraste nos títulos das categorias */
.cat-row { 
    background: rgba(99, 102, 241, 0.3); 
    color: #ffffff !important; 
    font-weight: bold;
}

        .points-badge { background: rgba(239, 68, 68, 0.2); border: 2px solid var(--error); padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 1.4rem; color: #fff; }

        .counter-group { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-c { width: 35px; height: 35px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; font-size: 1.2rem; }
        .btn-minus { background: var(--error); }
        .btn-plus { background: var(--success); }
        .val-display { font-size: 1.2rem; min-width: 25px; text-align: center; color: #fff; }

        .signatures { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .sig-box { background: var(--card); padding: 15px; border-radius: 12px; border: 2px solid var(--primary); text-align: center; }
        .sig-box span { color: var(--accent); font-weight: bold; display: block; margin-bottom: 10px; }
        canvas { background: #ffffff; border-radius: 4px; touch-action: none; width: 100%; height: 120px; cursor: crosshair; }

        .obs-container { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 20px; }
        textarea { width: 100%; height: 80px; background: #0f172a; color: white; border: 1px solid #334155; border-radius: 8px; padding: 10px; resize: none; margin-top: 5px; font-size: 1rem; }

        .btn-final { background: var(--success); color: white; padding: 25px; width: 100%; border-radius: 12px; font-size: 1.6rem; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; margin-bottom: 50px; }

        /* ESTILO DO PDF - FUNDO BRANCO E LETRA PRETA */
        /* Estilo para garantir fundo branco e letra preta no PDF */
#pdf-hidden { 
    background: #ffffff !important; 
    color: #000000 !important; 
}

#pdf-hidden table th { 
    background-color: #eeeeee !important; 
    color: #000000 !important; 
}
        .pdf-table td { border: 1px solid #000; padding: 8px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-bar">
        <a href="index.html" class="btn-retorno">⬅ VÍDEOS</a>
        <input type="text" id="nome-aluno-exame" placeholder="NOME DO CANDIDATO" style="padding: 12px; border-radius: 8px; background: #0f172a; color: white; border: 1px solid var(--primary); width: 280px; text-align: center; font-weight: bold;">
        <div class="points-badge">PONTOS: <span id="total-geral">0</span> / 10</div>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width: 60px;">CÓD</th>
                <th>DESCRIÇÃO DA INFRAÇÃO (RES. 789/20)</th>
                <th style="text-align:center; width: 70px;">PTS</th>
                <th style="text-align:center; width: 130px;">CONTADOR</th>
                <th style="text-align:center; width: 70px;">SUB</th>
            </tr>
        </thead>
        <tbody id="corpo-tabela"></tbody>
    </table>

    <div class="obs-container">
        <label style="color: var(--accent); font-weight: bold;">📝 OBSERVAÇÕES TÉCNICAS:</label>
        <textarea id="obs-instrutor" placeholder="Anotações do exame..."></textarea>
    </div>

    <div class="signatures">
        <div class="sig-box">
            <span>✍️ ASSINATURA DO ALUNO</span>
            <canvas id="pad-aluno"></canvas>
            <button onclick="clearSig('aluno')" style="margin-top:8px; cursor:pointer;">LIMPAR</button>
        </div>
        <div class="sig-box">
            <span>✍️ ASSINATURA DO INSTRUTOR</span>
            <canvas id="pad-instrutor"></canvas>
            <button onclick="clearSig('instrutor')" style="margin-top:8px; cursor:pointer;">LIMPAR</button>
        </div>
    </div>

    <button class="btn-final" onclick="gerarPDF()">🏁 FINALIZAR E GERAR PDF</button>
</div>

<div id="pdf-hidden">
    <div style="text-align:center; border-bottom: 2px solid black; padding-bottom: 10px; margin-bottom: 20px;">
        <h1 style="margin:0;">SALVANDO VIDAS NO TRÂNSITO!!!!!</h1>
        <h3 style="margin:5px 0;">BOLETIM DE AVALIAÇÃO PRÁTICA </h3>
    </div>
    <p><strong>CANDIDATO:</strong> <span id="p-nome"></span></p>
    <p><strong>RESULTADO:</strong> <span id="p-status"></span> (<span id="p-pontos"></span> pts)</p>
    
    <table class="pdf-table" id="p-tabela"></table>
    
    <div style="margin-top:20px; border: 1px solid black; padding: 10px;">
        <strong>OBSERVAÇÕES:</strong> <span id="p-obs"></span>
    </div>

    <div style="display: flex; justify-content: space-around; margin-top: 50px; text-align: center;">
        <div style="width: 200px; border-top: 1px solid black;">
            <img id="p-sig-aluno" style="width:100%;"><br>Assinatura do Aluno
        </div>
        <div style="width: 200px; border-top: 1px solid black;">
            <img id="p-sig-inst" style="width:100%;"><br>Assinatura do Instrutor
        </div>
    </div>
</div>

<script>
    const infrações = [
        { cat: "Faltas Eliminatórias (11 Pontos)", itens: [
            {c:"E1", d:"Sinalização Semafórica/Parada Obrigatória", p:11},
            {c:"E2", d:"Avançar sobre o meio-fio/calçada", p:11},
            {c:"E3", d:"Não usar cinto de segurança", p:11},
            {c:"E4", d:"Cometer infração de natureza gravíssima", p:11},
            {c:"E5", d:"Provocar acidente durante o exame", p:11},
            {c:"E6", d:"Exceder a velocidade da via", p:11}
        ]},
        { cat: "Faltas Graves (03 Pontos)", itens: [
            {c:"G1", d:"Não sinalizar manobras (Seta)", p:3},
            {c:"G2", d:"Não usar retrovisores", p:3},
            {c:"G3", d:"Perder o controle da direção", p:3},
            {c:"G4", d:"Não observar preferencial", p:3},
            {c:"G5", d:"Manter porta aberta em movimento", p:3}
        ]},
        { cat: "Faltas Médias (02 Pontos)", itens: [
            {c:"M1", d:"Pisar embreagem antes do freio", p:2},
            {c:"M2", d:"Deixar o motor morrer (apagou)", p:2},
            {c:"M3", d:"Roda em contato com o meio-fio", p:2},
            {c:"M4", d:"Não usar freio de mão em parada", p:2}
        ]},
        { cat: "Faltas Leves (01 Ponto)", itens: [
            {c:"L1", d:"Provocar solavancos no veículo", p:1},
            {c:"L2", d:"Ajuste incorreto de banco/espelho", p:1},
            {c:"L3", d:"Mãos incorretas no volante", p:1},
            {c:"L4", d:"Negligenciar economia de combustível", p:1}
        ]}
    ];

    let scores = {};
    function render() {
        const table = document.getElementById('corpo-tabela');
        table.innerHTML = "";
        infrações.forEach(g => {
            table.innerHTML += `<tr class="cat-row"><td colspan="5">${g.cat}</td></tr>`;
            g.itens.forEach(i => {
                scores[i.c] = 0;
                table.innerHTML += `<tr>
                    <td>${i.c}</td>
                    <td>${i.d}</td>
                    <td align="center">${i.p == 11 ? 'ELIM' : i.p}</td>
                    <td>
                        <div class="counter-group">
                            <button class="btn-c btn-minus" onclick="alterar('${i.c}', -1, ${i.p})">-</button>
                            <span class="val-display" id="val-${i.c}">0</span>
                            <button class="btn-c btn-plus" onclick="alterar('${i.c}', 1, ${i.p})">+</button>
                        </div>
                    </td>
                    <td align="center" id="sub-${i.c}">0</td>
                </tr>`;
            });
        });
    }

    function alterar(id, delta, peso) {
        if (scores[id] + delta < 0) return;
        scores[id] += delta;
        document.getElementById(`val-${id}`).innerText = scores[id];
        document.getElementById(`sub-${id}`).innerText = scores[id] * peso;
        let total = 0; 
        infrações.forEach(g => g.itens.forEach(i => total += (scores[i.c] * i.p)));
        document.getElementById('total-geral').innerText = total;
    }

    function setupCanvas(id) {
        const c = document.getElementById(id); const ctx = c.getContext('2d'); let draw = false;
        ctx.lineWidth = 3; ctx.strokeStyle = "#000000";
        const pos = (e) => { const r = c.getBoundingClientRect(); return { x: (e.clientX || (e.touches && e.touches[0].clientX)) - r.left, y: (e.clientY || (e.touches && e.touches[0].clientY)) - r.top }; };
        c.onmousedown = c.ontouchstart = (e) => { draw = true; ctx.beginPath(); const p = pos(e); ctx.moveTo(p.x, p.y); };
        c.onmousemove = c.ontouchmove = (e) => { if(!draw) return; const p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); };
        c.onmouseup = c.ontouchend = () => draw = false;
    }
    
    function clearSig(who) { const c = document.getElementById('pad-'+who); c.getContext('2d').clearRect(0,0,c.width,c.height); }

    function gerarPDF() {
        const total = parseInt(document.getElementById('total-geral').innerText);
        const nome = document.getElementById('nome-aluno-exame').value || "CANDIDATO";
        document.getElementById('p-nome').innerText = nome.toUpperCase();
        document.getElementById('p-pontos').innerText = total;
        document.getElementById('p-status').innerText = total > 10 ? "REPROVADO" : "APROVADO";
        document.getElementById('p-status').style.color = total > 10 ? "red" : "green";
        document.getElementById('p-obs').innerText = document.getElementById('obs-instrutor').value || "Sem observações.";
        
        document.getElementById('p-sig-aluno').src = document.getElementById('pad-aluno').toDataURL();
        document.getElementById('p-sig-inst').src = document.getElementById('pad-instrutor').toDataURL();

        let tab = "<tr style='background-color: #eee;'><th>Cód</th><th>Descrição</th><th>Qtd</th><th>Pts</th></tr>";
        infrações.forEach(g => g.itens.forEach(i => { if(scores[i.c] > 0) tab += `<tr><td>${i.c}</td><td>${i.d}</td><td>${scores[i.c]}</td><td>${scores[i.c]*i.p}</td></tr>`; }));
        document.getElementById('p-tabela').innerHTML = tab;

        const el = document.getElementById('pdf-hidden'); el.style.display="block";
        html2pdf().from(el).set({ margin: 10, filename: `Avaliacao_${nome}.pdf` }).save().then(()=>el.style.display="none");
    }

    window.onload = () => { render(); setupCanvas('pad-aluno'); setupCanvas('pad-instrutor'); };
</script>
</body>
</html>
